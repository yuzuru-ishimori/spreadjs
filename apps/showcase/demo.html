<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
<title>Nanairo Sheet（仮称）SDK — 動作デモ</title>
<style>
  :root {
    --ink: #1a1f2e; --sub: #5a6478; --line: #e3e7ef; --bg: #f7f8fb; --card: #ffffff;
    --ok: #1a7f4e; --ok-bg: #e8f5ee;
    --warn: #9a6b00; --warn-bg: #fdf3dc;
    --err: #a33333; --err-bg: #fdecec;
    --accent: #2b5fb8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif; color: var(--ink); background: var(--bg); line-height: 1.6; height: 100vh; display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 14px; padding: 10px 18px; background: var(--card); border-bottom: 1px solid var(--line); flex: 0 0 auto; }
  header a.back { font-size: 13px; color: var(--accent); text-decoration: none; white-space: nowrap; }
  header h1 { font-size: 15px; flex: 1; }
  .status { display: flex; gap: 8px; align-items: center; font-size: 12px; }
  .pill { border-radius: 12px; padding: 2px 10px; font-weight: 600; background: var(--warn-bg); color: var(--warn); }
  .pill.online { background: var(--ok-bg); color: var(--ok); }
  .pill.offline, .pill.stopped { background: var(--err-bg); color: var(--err); }
  .pill.quiet { background: #eef0f5; color: var(--sub); font-weight: normal; }

  main { flex: 1 1 auto; display: flex; min-height: 0; }
  #stage-wrap { flex: 1 1 auto; padding: 14px; min-width: 0; display: flex; }
  #stage { flex: 1; background: var(--card); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }

  aside { flex: 0 0 320px; border-left: 1px solid var(--line); background: var(--card); padding: 18px; overflow-y: auto; }
  aside h2 { font-size: 15px; }
  aside p.goal { font-size: 12.5px; color: var(--sub); margin-top: 6px; }
  aside ol { margin: 12px 0 0 20px; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
  aside ol code { background: #f0f2f7; border: 1px solid var(--line); border-radius: 4px; padding: 1px 6px; font-size: 11.5px; word-break: break-all; }
  aside .actions { margin-top: 14px; }
  aside .actions button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 8px 14px; font-size: 13px; cursor: pointer; }
  aside .actions button:hover { opacity: .9; }
  aside .others { margin-top: 22px; border-top: 1px solid var(--line); padding-top: 12px; font-size: 12px; }
  aside .others b { display: block; color: var(--sub); font-weight: 600; margin-bottom: 6px; }
  aside .others a { display: inline-block; margin: 0 10px 6px 0; color: var(--accent); text-decoration: none; }
  aside .others a.current { color: var(--ink); font-weight: 600; text-decoration: underline; }
  #event-log { margin-top: 16px; font-size: 11px; color: var(--sub); max-height: 130px; overflow-y: auto; border-top: 1px solid var(--line); padding-top: 8px; }
</style>
</head>
<body>
<header>
  <a class="back" href="./index.html">← 機能カタログへ</a>
  <h1 id="demo-title">動作デモ</h1>
  <div class="status">
    <span class="pill" id="conn">接続中...</span>
    <span class="pill quiet" id="pending">未送信 0</span>
  </div>
</header>
<main>
  <div id="stage-wrap"><div id="stage"></div></div>
  <aside>
    <h2 id="scenario-title"></h2>
    <p class="goal" id="scenario-goal"></p>
    <ol id="scenario-steps"></ol>
    <div class="actions" id="scenario-actions"></div>
    <div class="others" id="scenario-others"></div>
    <div id="event-log"></div>
  </aside>
</main>
<script type="module" src="/src/demo/main.ts"></script>
</body>
</html>
