<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spreadjs playground — React Facade（DD-025・NanairoSheetView・StrictMode）</title>
    <style>
      html,
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #222;
      }
      .rx-wrap {
        display: flex;
        flex-direction: column;
        height: 100vh;
        box-sizing: border-box;
        padding: 8px 12px;
      }
      .rx-header {
        flex: 0 0 auto;
      }
      .rx-header h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      .rx-status {
        font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        color: #14522a;
        margin-bottom: 6px;
      }
      /* React が #react-root 内へ NanairoSheetView（＝Facade div → grid Canvas/scroller/textarea）を構築する。
         size 済み container を渡す（grid は container サイズを読む）。 */
      #react-root {
        flex: 1 1 auto;
        position: relative;
        min-height: 0;
        border: 1px solid #dadce0;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <div class="rx-wrap">
      <div class="rx-header">
        <h1>React Facade（DD-025） — &lt;NanairoSheetView mode="standalone"&gt; ／ StrictMode</h1>
        <div id="rx-status" class="rx-status">初期化中…</div>
      </div>
      <div id="react-root"></div>
    </div>
    <script type="module" src="/src/integration/react-main.ts"></script>
  </body>
</html>
