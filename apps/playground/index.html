<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>spreadjs playground — PoC-A</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 16px;
        color: #555;
      }

      /* スクロール検証用の overflow コンテナ（グリッドはこれより大きい）。 */
      #grid-scroll {
        width: 680px;
        height: 440px;
        overflow: auto;
        border: 1px solid #bbb;
        background: #fff;
        outline: none;
      }

      #grid-scroll:focus-visible {
        box-shadow: inset 0 0 0 2px #1a73e8;
      }

      #grid {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>spreadjs playground — PoC-A グリッド土台</h1>
    <p>
      クリック / 矢印 / Enter（下）/ Shift+Enter（上）/ Tab（右）/ Shift+Tab（左）で選択セルを移動できます。
      編集・IME・リモート更新は後続 Phase で実装します。
    </p>
    <div id="grid-scroll" tabindex="0">
      <canvas id="grid"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
